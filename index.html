<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panitian Elementary School Reading Progress Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="login-container">
    
    <header>
            <img src="pes-logo.png" alt="School Logo" class="school-logo"/>
      <h1>PANITIAN ELEMENTARY SCHOOL</h1>
      <p class="subtitle">READING PROGRESS TRACKER on the Implemetation of ARAL-Reading Program</p>
    </header>


    <div class="collage">
      <img src="img/r1.jpg" class="collage-img img1" alt="Reading image 1" />
      <img src="img/r1.jpg" class="collage-img img2" alt="Reading image 2" />
      <img src="img/r3.jpg" class="collage-img img3" alt="Reading image 3" />
      <img src="img/r4.jpg" class="collage-img img4" alt="Reading image 4" />
      <img src="img/r5.jpg" class="collage-img img5" alt="Reading image 5" />
      <img src="img/r6.jpg" class="collage-img img6" alt="Reading image 6" />
      <img src="img/r7.jpg" class="collage-img img7" alt="Reading image 7" />
      <img src="img/r8.jpg" class="collage-img img8" alt="Reading image 8" />
    </div>

    <form id="loginForm">
      <input type="text" id="username" placeholder="Enter Learner Reference Number" required />
      <button type="submit">Login</button>
    </form>
    <p class="subtitle">Type your LRN and Click Login button</p>
    </div>

    <div class="footer">
        <p>© 2025 Panitian Elementary School | Toy Lalong-isip</p>
      </div>
    <div id="result"></div>
  </div>

    <!-- Loader -->
  <div id="loader" class="loader-overlay">
    <div class="loader"></div>
    <p>Fetching data, please wait...</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
